    <canvas id="drawing" width="400" height="200">A drawing of something</canvas>
    <canvas id="linear" width="300" height="300">123</canvas>

            grad.addColorStop(1, 'blue');

            // 画矩形

            // let ctx2 = cav.createRadialGradient(10, 10, 50);
